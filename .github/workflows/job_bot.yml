name: Daily Job Bot

on:
  schedule:
    - cron: '30 1 * * *'   # Runs at 7:00 AM IST (1:30 AM UTC) every day
  workflow_dispatch:         # Also lets you trigger it manually from GitHub

jobs:
  run-job-bot:
    runs-on: ubuntu-latest  # GitHub provides this machine FREE

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Bot
        env:
          YOUR_NAME: ${{ secrets.YOUR_NAME }}
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
          YOUR_GMAIL: ${{ secrets.YOUR_GMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JOB_KEYWORDS: ${{ secrets.JOB_KEYWORDS }}
          JOB_LOCATION: ${{ secrets.JOB_LOCATION }}
        run: python job_bot.py
